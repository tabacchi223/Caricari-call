<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carica.ri Cantina - 電話する</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Libre+Baskerville&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 48px 24px;
    overflow: hidden;
  }

  .bg-photo {
    position: fixed;
    inset: 0;
    z-index: -2;
  }

  .bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg, rgba(10,6,4,0.45) 0%, rgba(10,6,4,0.55) 50%, rgba(10,6,4,0.80) 100%);
  }

  .card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .logo {
    width: 260px;
    margin: 0 auto 28px;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }

  .logo img {
    width: 100%;
    height: auto;
    display: block;
    filter: invert(1);
  }

  .reservation-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #e3b272;
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
  }

  .reservation-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .hours {
    margin-bottom: 28px;
    padding: 0 4px;
  }

  .hours-section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #e3b272;
    text-transform: uppercase;
    text-align: left;
    margin: 12px 0 4px;
  }

  .hours-section-label:first-child {
    margin-top: 0;
  }

  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
  }

  .hours-divider {
    height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .hours-day {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    text-transform: uppercase;
  }

  .hours-time {
    font-family: 'Libre Baskerville', serif;
    font-size: 14px;
    color: #fdf8f2;
    letter-spacing: 0.04em;
  }

  .call-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-decoration: none;
    background: rgba(255,255,255,0.95);
    color: #2b2520;
    padding: 26px 24px;
    border-radius: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    transition: transform 0.2s ease;
  }

  .call-button:active {
    transform: scale(0.97);
  }

  .icon { width: 24px; height: 24px; }

  .call-text {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8a7b6f;
  }

  .number {
    font-family: 'Libre Baskerville', serif;
    font-size: 26px;
    letter-spacing: 0.06em;
    color: #2b2520;
  }
</style>
</head>
